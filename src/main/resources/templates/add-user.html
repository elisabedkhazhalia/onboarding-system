<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>თანამშრომლის დამატება</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow">
        <div class="card-header bg-primary text-white">
          <h4 class="mb-0">ახალი თანამშრომლის დამატება</h4>
        </div>
        <div class="card-body">
          <!-- ფორმა, რომელიც POST მეთოდით გააგზავნის მონაცემებს კონტროლერში -->
          <form th:action="@{/hr/users/add}" th:object="${user}" method="post">
            <div class="mb-3">
              <label class="form-label">სახელი</label>
              <input type="text" class="form-control" th:field="*{firstName}" required>
            </div>
            <div class="mb-3">
              <label class="form-label">გვარი</label>
              <input type="text" class="form-control" th:field="*{lastName}" required>
            </div>
            <div class="mb-3">
              <label class="form-label">ელ-ფოსტა</label>
              <input type="email" class="form-control" th:field="*{email}" required>
            </div>
            <div class="mb-3">
              <label class="form-label">დროებითი პაროლი</label>
              <input type="password" class="form-control" th:field="*{password}" required>
            </div>

            <div class="d-grid gap-2">
              <button type="submit" class="btn btn-success">ბაზაში შენახვა</button>
              <a href="/hr/dashboard" class="btn btn-outline-secondary">უკან დაბრუნება</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
