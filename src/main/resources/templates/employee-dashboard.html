<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>ჩემი სივრცე</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .progress-bar-animated { transition: width 1s ease-in-out; }
        .task-card { transition: transform 0.2s; }
        .task-card:hover { transform: scale(1.02); }
    </style>
</head>
<body class="bg-light">
<div class="container mt-5">

    <div class="row mb-4">
        <div class="col-12">
            <div class="card shadow-sm border-0">
                <div class="card-body text-center p-4">
                    <h3 class="mb-3">კეთილი იყოს შენი მობრძანება გუნდში! 🎉</h3>
                    <p class="text-muted">შენი ინტეგრაციის პროგრესი</p>

                    <div class="progress" style="height: 30px; border-radius: 15px;">
                        <div class="progress-bar bg-success progress-bar-striped progress-bar-animated fw-bold fs-6"
                             role="progressbar"
                             th:style="'width: ' + ${progress} + '%;'"
                             th:text="${progress} + '%'">
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <h4 class="mb-3">შენი დავალებები</h4>

    <div class="row">
        <div th:if="${tasks.empty}" class="col-12 text-center text-muted my-5">
            <h5>ამჟამად დავალებები არ გაქვს. დაისვენე! ☕</h5>
        </div>

        <div th:each="task : ${tasks}" class="col-md-4 mb-3">
            <div class="card shadow-sm task-card border-0 border-start border-4"
                 th:classappend="${task.status == 'DONE'} ? 'border-success' : 'border-warning'">
                <div class="card-body">
                    <h5 class="card-title" th:text="${task.title}">დავალების სათაური</h5>
                    <p class="card-text text-muted" th:text="${task.description}">აღწერა</p>
                    <div class="d-flex justify-content-between align-items-center">
                        <span class="badge"
                              th:classappend="${task.status == 'DONE'} ? 'bg-success' : 'bg-warning text-dark'"
                              th:text="${task.status}">სტატუსი</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

</div>
</body>
</html>
