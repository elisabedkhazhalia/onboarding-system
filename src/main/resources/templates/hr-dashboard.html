<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>HR Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h2 class="mb-4">HR Dashboard - თანამშრომლები</h2>

    <a href="/hr/users/add" class="btn btn-primary mb-3">ახალი თანამშრომლის დამატება</a>

    <table class="table table-bordered table-striped">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>სახელი</th>
            <th>გვარი</th>
            <th>ელ-ფოსტა</th>
            <th>როლი</th>
            <th>სტატუსი</th>
            <th>მოქმედება</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="user : ${users}">
            <td th:text="${user.id}">1</td>
            <td th:text="${user.firstName}">სახელი</td>
            <td th:text="${user.lastName}">გვარი</td>
            <td th:text="${user.email}">ფოსტა</td>
            <td th:text="${user.role}">როლი</td>
            <td th:text="${user.isEnabled ? 'აქტიური' : 'გათიშული'}">აქტიური</td>
            <td>
                <a href="#" class="btn btn-sm btn-warning">რედაქტირება</a>
                <a href="#" class="btn btn-sm btn-danger">წაშლა</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
