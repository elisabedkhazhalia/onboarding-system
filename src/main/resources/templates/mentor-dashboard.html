<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>მენტორის პანელი</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5" style="max-width: 1000px;">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="fw-bold text-dark mb-1">🤝 მენტორის სამუშაო სივრცე</h2>
        </div>
        <div>
            <a href="/dashboard" class="btn btn-outline-secondary rounded-pill px-3">← დაბრუნება</a>
            <form th:action="@{/logout}" method="post" style="display: inline;">
                <button type="submit" class="btn btn-danger rounded-pill px-3">🚪 გასვლა</button>
            </form>
        </div>
    </div>

    <div class="card shadow-sm border-0 rounded-4">
        <div class="card-body p-4">
            <h5 class="fw-bold mb-3">📋 ჩემი სტუდენტები</h5>
            <table class="table align-middle">
                <thead class="table-light">
                <tr>
                    <th>თანამშრომელი</th>
                    <th>ელ-ფოსტა</th>
                    <th>მოქმედება</th>
                </tr>
                </thead>
                <tbody>
                <!-- აქ ვამოწმებთ mentees-ს, თუ ცარიელია, ერორი რომ არ ამოაგდოს -->
                <tr th:each="mentee : ${mentees}">
                    <td th:text="${mentee.firstName + ' ' + mentee.lastName}">სახელი გვარი</td>
                    <td th:text="${mentee.email}">email</td>
                    <td>
                        <a th:href="@{/mentor/mentees/{id}/tasks(id=${mentee.id})}" class="btn btn-sm btn-primary rounded-pill">📋 მისიების მართვა</a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(mentees)}">
                    <td colspan="3" class="text-center py-4 text-muted">ამჟამად სტუდენტები არ არის მიბმული.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
