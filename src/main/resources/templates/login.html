<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>სისტემაში შესვლა</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="height: 100vh;">
<div class="card shadow p-4" style="width: 400px;">
  <div class="text-center mb-4">
    <h3>ავტორიზაცია</h3>
    <p class="text-muted">Onboarding სისტემაში შესვლა</p>
  </div>

  <div th:if="${param.error}" class="alert alert-danger text-center">
    ელ-ფოსტა ან პაროლი არასწორია.
  </div>
  <div th:if="${param.logout}" class="alert alert-success text-center">
    თქვენ წარმატებით გამოხვედით სისტემიდან.
  </div>

  <form th:action="@{/login}" method="post">
    <div class="mb-3">
      <label class="form-label">ელ-ფოსტა</label>
      <input type="email" name="username" class="form-control" required placeholder="მაგ: name@domain.com">
    </div>
    <div class="mb-3">
      <label class="form-label">პაროლი</label>
      <input type="password" name="password" class="form-control" required>
    </div>
    <button type="submit" class="btn btn-primary w-100 mt-2">შესვლა</button>
  </form>
</div>
</body>
</html>
