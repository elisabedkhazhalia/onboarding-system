<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>თანამშრომლის რედაქტირება</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5" style="max-width: 600px;">
  <div class="card shadow-sm border-0 rounded-4">
    <div class="card-body p-5">
      <h3 class="fw-bold text-dark mb-4">📝 მონაცემების რედაქტირება</h3>

      <form th:action="@{/hr/users/edit/{id}(id=${user.id})}" th:object="${user}" method="post">

        <div class="mb-3">
          <label class="form-label fw-semibold">სახელი</label>
          <input type="text" th:field="*{firstName}" class="form-control rounded-3" required>
        </div>

        <div class="mb-3">
          <label class="form-label fw-semibold">გვარი</label>
          <input type="text" th:field="*{lastName}" class="form-control rounded-3" required>
        </div>

        <div class="mb-3">
          <label class="form-label fw-semibold">ელ-ფოსტა</label>
          <input type="email" th:field="*{email}" class="form-control rounded-3" required>
        </div>

        <div class="mb-3">
          <label class="form-label fw-semibold">პაროლი</label>
          <input type="password" th:field="*{password}" class="form-control rounded-3" placeholder="ჩაწერეთ საწყისი პაროლი" required>
        </div>

        <div class="mb-3">
          <label class="form-label fw-semibold">როლი სისტემაში</label>
          <select th:field="*{role}" class="form-select rounded-3" required>
            <option value="USER">მომხმარებელი (Employee)</option>
            <option value="HR">HR ადმინისტრატორი</option>
          </select>
        </div>

        <div class="mb-4 form-check form-switch">
          <input class="form-switch-input form-check-input" type="checkbox" th:field="*{enabled}" id="isEnabledSwitch">
          <label class="form-check-label fw-semibold ms-2" for="isEnabledSwitch">სტატუსი: აქტიურია</label>
        </div>

        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-primary rounded-pill px-4">შენახვა</button>
          <a href="/hr/dashboard" class="btn btn-outline-secondary rounded-pill px-4">გაუქმება</a>
        </div>
      </form>
    </div>
  </div>
</div>
</body>
</html>
